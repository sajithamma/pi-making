<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>π from Inscribed Polygons (Vertical / Mobile)</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #0b0e14;
      overflow: hidden;
    }
    .scale-label { font-family: ui-monospace, "SF Mono", Monaco, monospace; font-size: 13px; color: rgba(255, 255, 255, 0.88); white-space: nowrap; text-shadow: 0 0 4px rgba(0,0,0,0.8); pointer-events: none; }
    .scale-label.major { font-weight: 700; font-size: 14px; }
    .scale-label.pi { color: #a3e635; font-weight: 700; font-size: 15px; }
    .art-info { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 28px; color: rgba(255, 255, 255, 0.9); background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 8px; white-space: nowrap; pointer-events: none; }
    .art-info .art-info-n { color: #a3e635; font-weight: 700; }
    .art-info .art-info-value { color: #22d3ee; font-weight: 700; }
    .diameter-label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; color: rgba(255, 255, 255, 0.85); white-space: nowrap; pointer-events: none; }
    .final-message { font-family: ui-sans-serif, system-ui, sans-serif; font-size: clamp(14px, 3vw, 24px); font-weight: 700; color: rgba(255, 255, 255, 0.95); text-align: center; line-height: 1.35; pointer-events: none; background: rgba(11, 14, 20, 0.92); padding: 10px 16px; border-radius: 10px; box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); }
    .final-message .pi-highlight { color: #a3e635; text-shadow: 0 0 16px rgba(163, 230, 53, 0.5); }
    .final-message .pi-more { color: rgba(255, 255, 255, 0.5); font-weight: 600; }
    .final-message .final-pn-value { color: #22d3ee; font-weight: 700; }
    #pi-reached { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(11, 14, 20, 0.85); pointer-events: none; }
    #pi-reached.show { display: flex; }
    #pi-reached .box { font-size: clamp(18px, 4vw, 28px); font-weight: 700; color: rgba(255, 255, 255, 0.95); text-align: center; }
  </style>
</head>

<body>
  <script type="module">

    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js';
    import { Line2 } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/lines/Line2.js';
    import { LineGeometry } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/lines/LineGeometry.js';
    import { LineMaterial } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/lines/LineMaterial.js';

    const TAU = Math.PI * 2;
    const DIAMETER = 1;
    const r = DIAMETER / 2;
    const piLen = Math.PI;

    // Vertical layout: 9:16. Content centered vertically so circle is not cut off; lines stack downward, scale below.
    const DESIGN_ASPECT = 9 / 16;
    const viewHeight = 3;
    const viewWidth = viewHeight * DESIGN_ASPECT;

    const refX0 = -0.5;
    const scaleLength = 1.0;
    const HORIZ_SCALE = 1 / piLen;
    const circleOffsetX = 0;
    const LINE_GAP = -0.036;
    const DEFAULT_MAX_N = 30;
    // Shift block down and center in view (avoid top cut-off; center vertically).
    const refYRaw = 0.98;
    const scaleYRaw = refYRaw + (DEFAULT_MAX_N - 3) * LINE_GAP - 0.22;
    const blockTop = 1.5 + 0.5;
    const blockBottom = scaleYRaw - 0.14;
    const Y_OFFSET = (blockTop + blockBottom) / 2;
    const circleCenterY = 1.5 - Y_OFFSET;
    const refY = refYRaw - Y_OFFSET;
    const scaleY = refY + (DEFAULT_MAX_N - 3) * LINE_GAP - 0.22;

    function polygonPerimeter(n) {
      return 2 * n * r * Math.sin(Math.PI / n);
    }

    function regularPolygonPoints(n, radius, z = 0) {
      const pts = [];
      const start = -Math.PI / 2;
      for (let i = 0; i < n; i++) {
        const a = start + (TAU * i) / n;
        pts.push(new THREE.Vector3(Math.cos(a) * radius, Math.sin(a) * radius, z));
      }
      pts.push(pts[0].clone());
      return pts;
    }

    function perimeterToLinePoints(polygonPts, originX, originY, z = 0, scaleX = 1) {
      const out = [new THREE.Vector3(originX, originY, z)];
      let x = originX;
      for (let i = 0; i < polygonPts.length - 1; i++) {
        const len = polygonPts[i].distanceTo(polygonPts[i + 1]);
        x += len * scaleX;
        out.push(new THREE.Vector3(x, originY, z));
      }
      return out;
    }

    const scene = new THREE.Scene();
    const aspect = window.innerWidth / window.innerHeight;
    const isPortrait = aspect < 1;
    const camHalfW = isPortrait ? viewWidth / 2 : viewHeight * aspect / 2;
    const camHalfH = viewHeight / 2;
    const camera = new THREE.OrthographicCamera(-camHalfW, camHalfW, camHalfH, -camHalfH, 0.01, 100);
    camera.position.set(0, 0, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(3, 5, 4);
    scene.add(dir);

    const grid = new THREE.GridHelper(12, 24, 0xffffff, 0xffffff);
    grid.position.set(0, 0.5, 0);
    grid.material.opacity = 0.08;
    grid.material.transparent = true;
    scene.add(grid);

    const circlePositions = [];
    Array.from({ length: 361 }, (_, i) => {
      const a = (TAU * i) / 360;
      circlePositions.push(Math.cos(a) * r, Math.sin(a) * r, 0);
    });
    const circleLineGeom = new LineGeometry();
    circleLineGeom.setPositions(circlePositions);
    const PERIMETER_LINE_WIDTH = 0.022;
    const circleLineMat = new LineMaterial({ color: 0xf97316, linewidth: PERIMETER_LINE_WIDTH, worldUnits: true });
    const circleLine = new Line2(circleLineGeom, circleLineMat);
    circleLine.position.set(0, circleCenterY, 0);
    circleLineMat.resolution.set(renderer.getSize(new THREE.Vector2()));
    scene.add(circleLine);

    const completedLineColor = 0xb0b0b0;
    let perimeterLine = null;
    const completedLinesGroup = new THREE.Group();
    scene.add(completedLinesGroup);

    const scaleTickLenMinor = 0.025;
    const scaleTickLenMajor = 0.06;
    const scaleMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
    const scaleLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(refX0, scaleY, 0),
        new THREE.Vector3(refX0 + scaleLength, scaleY, 0),
      ]),
      scaleMat
    );
    scene.add(scaleLine);
    for (let i = 0; i <= 31; i++) {
      const v = i * 0.1;
      const x = refX0 + (v / piLen);
      const len = (Math.abs(v - Math.round(v)) < 0.01 && v <= 3) ? scaleTickLenMajor : scaleTickLenMinor;
      const g = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x, scaleY, 0),
        new THREE.Vector3(x, scaleY + len, 0),
      ]);
      scene.add(new THREE.Line(g, scaleMat));
    }
    const piTickGeom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(refX0 + scaleLength, scaleY, 0),
      new THREE.Vector3(refX0 + scaleLength, scaleY + scaleTickLenMajor * 1.3, 0),
    ]);
    scene.add(new THREE.Line(piTickGeom, new THREE.LineBasicMaterial({ color: 0xa3e635, transparent: true, opacity: 0.9 })));

    const piVerticalY0 = scaleY - 0.06;
    const piVerticalY1 = refY + 0.45;
    const piDashedGeom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(refX0 + scaleLength, piVerticalY0, 0),
      new THREE.Vector3(refX0 + scaleLength, piVerticalY1, 0),
    ]);
    const piDashedLine = new THREE.Line(
      piDashedGeom,
      new THREE.LineDashedMaterial({ color: 0xa3e635, dashSize: 0.06, gapSize: 0.04, transparent: true, opacity: 0.9 })
    );
    piDashedLine.computeLineDistances();
    scene.add(piDashedLine);

    const labelY = scaleY - 0.05;
    const scaleLabelsGroup = new THREE.Group();
    [0, 1, 2, 3].forEach((v) => {
      const div = document.createElement('div');
      div.className = v === 0 ? 'scale-label major' : 'scale-label major';
      div.textContent = String(v);
      const obj = new CSS2DObject(div);
      obj.position.set(refX0 + v / piLen, labelY, 0);
      obj.center.set(0.5, 1);
      scaleLabelsGroup.add(obj);
    });
    const piDiv = document.createElement('div');
    piDiv.className = 'scale-label pi';
    piDiv.textContent = '3.14';
    const piLabel = new CSS2DObject(piDiv);
    piLabel.position.set(refX0 + scaleLength + 0.04, labelY, 0);
    piLabel.center.set(0.5, 1);
    scaleLabelsGroup.add(piLabel);
    scene.add(scaleLabelsGroup);

    const artInfoDiv = document.createElement('div');
    artInfoDiv.className = 'art-info';
    const artInfoLabel = new CSS2DObject(artInfoDiv);
    artInfoLabel.position.set(0, scaleY - 0.14, 0);
    artInfoLabel.center.set(0.5, 0);
    scene.add(artInfoLabel);

    const diameterDiv = document.createElement('div');
    diameterDiv.className = 'diameter-label';
    diameterDiv.textContent = 'diameter = 1';
    const diameterLabel = new CSS2DObject(diameterDiv);
    diameterLabel.position.set(0, circleCenterY + 0.56, 0);
    diameterLabel.center.set(0.5, 0);
    scene.add(diameterLabel);

    let finalMessageLabel = null;
    const elPiReached = document.getElementById('pi-reached');

    const DEFAULT_SPEED = 2;
    function getSpeed() { return DEFAULT_SPEED; }
    function getMaxN() { return DEFAULT_MAX_N; }

    const DURATION = { circle: 2.2, polygon: 1.4, unroll: 1.8, showLength: 2.2 };

    let running = true;
    let n = 3;
    let phase = 'circle';
    let phaseTime = 0;
    let unrollT = 0;

    function goToPhase(p) {
      phase = p;
      phaseTime = 0;
      if (p === 'unroll') unrollT = 0;
      if (p === 'circle') {
        if (elPiReached) elPiReached.classList.remove('show');
        if (finalMessageLabel) {
          scene.remove(finalMessageLabel);
          finalMessageLabel = null;
        }
        n = 3;
        while (completedLinesGroup.children.length) {
          const c = completedLinesGroup.children[0];
          completedLinesGroup.remove(c);
          c.geometry.dispose();
          if (c.material) c.material.dispose();
        }
      }
    }

    function lineYForN(n) {
      return refY + (n - 3) * LINE_GAP;
    }

    function saveCompletedLine(forN) {
      const polyPts = regularPolygonPoints(forN, r, 0);
      const pts = perimeterToLinePoints(polyPts, refX0, lineYForN(forN), 0, HORIZ_SCALE);
      const positions = [];
      pts.forEach((p) => { positions.push(p.x, p.y, p.z); });
      const lineGeom = new LineGeometry();
      lineGeom.setPositions(positions);
      const lineMat = new LineMaterial({ color: completedLineColor, linewidth: PERIMETER_LINE_WIDTH, worldUnits: true });
      const res = renderer.getSize(new THREE.Vector2());
      lineMat.resolution.set(res.x, res.y);
      const line = new Line2(lineGeom, lineMat);
      completedLinesGroup.add(line);
    }

    function setN(newN) {
      n = Math.max(3, Math.min(newN, getMaxN()));
    }

    function updateHUD() {
      if (phase === 'circle') {
        artInfoDiv.innerHTML = '<span class="art-info-n">n = 0</span> &nbsp; <span class="art-info-value">0</span>';
      } else {
        const Pn = polygonPerimeter(n);
        artInfoDiv.innerHTML = '<span class="art-info-n">n = ' + n + '</span> &nbsp; <span class="art-info-value">' + Pn.toFixed(4) + '</span>';
      }
    }

    function lerpV3(a, b, t) {
      return new THREE.Vector3(
        a.x + (b.x - a.x) * t,
        a.y + (b.y - a.y) * t,
        a.z + (b.z - a.z) * t
      );
    }

    function getPerimeterPoints() {
      const polyPts = regularPolygonPoints(n, r, 0);
      const originX = refX0;
      const originY = lineYForN(n);
      const polyOff = (p) => new THREE.Vector3(p.x, p.y + circleCenterY, p.z);

      if (phase === 'polygon' || (phase === 'unroll' && unrollT <= 0)) {
        return polyPts.map(polyOff);
      }
      if (phase === 'show_length' || phase === 'done' || (phase === 'unroll' && unrollT >= 1)) {
        return perimeterToLinePoints(polyPts, originX, originY, 0, HORIZ_SCALE);
      }

      const unfolded = [];
      let x = originX;
      unfolded.push(new THREE.Vector3(x, originY, 0));
      for (let i = 0; i < n; i++) {
        const len = polyPts[i].distanceTo(polyPts[i + 1]);
        x += len * HORIZ_SCALE;
        unfolded.push(new THREE.Vector3(x, originY, 0));
      }

      const seg = Math.floor(unrollT * n);
      const segT = (unrollT * n - seg);
      if (seg >= n) return unfolded;

      const pts = [];
      if (seg === 0 && segT <= 0) return polyPts.map(polyOff);
      if (seg === 0) {
        pts.push(lerpV3(polyOff(polyPts[0]), unfolded[0], segT));
        pts.push(lerpV3(polyOff(polyPts[1]), unfolded[1], segT));
        for (let i = 2; i <= n - 1; i++) pts.push(polyOff(polyPts[i]));
      } else {
        for (let i = 0; i <= seg; i++) pts.push(unfolded[i].clone());
        pts.push(lerpV3(polyOff(polyPts[seg + 1]), unfolded[seg + 1], segT));
        for (let i = seg + 2; i <= n - 1; i++) pts.push(polyOff(polyPts[i]));
      }
      return pts;
    }

    function updateGeometry() {
      if (perimeterLine) {
        scene.remove(perimeterLine);
        perimeterLine.geometry.dispose();
        perimeterLine.material.dispose();
        perimeterLine = null;
      }
      if (phase === 'circle' || n < 3) return;
      const pts = getPerimeterPoints();
      if (pts.length < 2) return;
      const positions = [];
      pts.forEach((p) => { positions.push(p.x, p.y, p.z); });
      const lineGeom = new LineGeometry();
      lineGeom.setPositions(positions);
      const lineMat = new LineMaterial({ color: 0xa3e635, linewidth: PERIMETER_LINE_WIDTH, worldUnits: true });
      const res = renderer.getSize(new THREE.Vector2());
      lineMat.resolution.set(res.x, res.y);
      perimeterLine = new Line2(lineGeom, lineMat);
      scene.add(perimeterLine);
    }

    updateGeometry();
    updateHUD();

    function onResize() {
      const aspect = window.innerWidth / window.innerHeight;
      const isPortrait = aspect < 1;
      const camHalfW = isPortrait ? viewWidth / 2 : viewHeight * aspect / 2;
      const camHalfH = viewHeight / 2;
      camera.left = -camHalfW;
      camera.right = camHalfW;
      camera.top = camHalfH;
      camera.bottom = -camHalfH;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      const res = renderer.getSize(new THREE.Vector2());
      if (circleLine.material.resolution) circleLine.material.resolution.set(res.x, res.y);
      completedLinesGroup.children.forEach((c) => {
        if (c.material && c.material.resolution) c.material.resolution.set(res.x, res.y);
      });
    }
    window.addEventListener('resize', onResize);

    let lastTime = performance.now();
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      const now = performance.now();
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;

      if (running) {
        const speedMult = n >= 8 ? Math.min(2 ** (1 + Math.floor((n - 8) / 5)), 32) : 1;
        const speed = getSpeed() * speedMult;
        phaseTime += dt * speed;

        if (phase === 'circle') {
          if (phaseTime >= DURATION.circle) {
            goToPhase('polygon');
            setN(3);
            updateGeometry();
            updateHUD();
          }
        } else if (phase === 'polygon') {
          if (phaseTime >= DURATION.polygon) goToPhase('unroll');
        } else if (phase === 'unroll') {
          unrollT = Math.min(1, phaseTime / DURATION.unroll);
          unrollT = 0.5 - 0.5 * Math.cos(unrollT * Math.PI);
          updateGeometry();
          if (phaseTime >= DURATION.unroll) {
            unrollT = 1;
            goToPhase('show_length');
            updateGeometry();
            updateHUD();
          }
        } else if (phase === 'show_length') {
          if (phaseTime >= DURATION.showLength) {
            const maxN = getMaxN();
            if (n >= maxN) {
              goToPhase('done');
              if (!finalMessageLabel) {
                const finalDiv = document.createElement('div');
                finalDiv.className = 'final-message';
                finalMessageLabel = new CSS2DObject(finalDiv);
                finalMessageLabel.center.set(0.5, 0.5);
                scene.add(finalMessageLabel);
              }
              const PnFinal = polygonPerimeter(n).toFixed(10);
              const piStr = Math.PI.toFixed(14);
              const piHighlight = piStr.slice(0, 4);
              const piMore = piStr.slice(4);
              finalMessageLabel.element.innerHTML = '<div style="margin-bottom:0.25em;">At n = ' + n + ': Pₙ = <span class="final-pn-value">' + PnFinal + '</span></div><div>As n → ∞: π = <span class="pi-highlight">' + piHighlight + '</span><span class="pi-more">' + piMore + '</span></div>';
              finalMessageLabel.position.set(0, lineYForN(n) + 0.38, 0);
            } else {
              saveCompletedLine(n);
              setN(n + 1);
              goToPhase('polygon');
            }
            updateGeometry();
            updateHUD();
          }
        }
      }

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

  </script>
  <div id="pi-reached" aria-live="polite"><div class="box">π ≈ 3.14</div></div>
</body>

</html>
